<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVC Abogados — Herramientas para la práctica profesional de la abogacía Bonaerense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="menu-toggle" aria-label="Abrir menú">☰</button>

<aside id="sidebar" role="navigation" aria-label="Navegación principal">
  <div class="sidebar-brand">
    <a class="brand-logo" href="#" data-tool="home">
      <div class="brand-icon">M</div>
      <span class="brand-name">MVC<br>ABOGADOS</span>
    </a>
    <div class="brand-sub">Herramientas Legales</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Derecho Laboral</div>
    <button class="nav-item" data-tool="liquidacion">
      <span class="nav-icon">⚖️</span> Liquidación LCT
    </button>
    <button class="nav-item" data-tool="ley24013">
      <span class="nav-icon">📋</span> Ley 24.013
    </button>
    <button class="nav-item" data-tool="ley25323">
      <span class="nav-icon">➕</span> Ley 25.323
    </button>

    <div class="nav-label">Cálculos Judiciales</div>
    <button class="nav-item" data-tool="intereses">
      <span class="nav-icon">📈</span> Intereses BPBA
    </button>
    <button class="nav-item" data-tool="actualizacion">
      <span class="nav-icon">💹</span> Actualización
    </button>
    <button class="nav-item" data-tool="plazos">
      <span class="nav-icon">📅</span> Plazos Procesales
    </button>

    <div class="nav-label">Indemnizaciones</div>
    <button class="nav-item" data-tool="incapacidad">
      <span class="nav-icon">🩺</span> Incapacidad Física
    </button>
    <button class="nav-item" data-tool="danio-punitivo">
      <span class="nav-icon">⚠️</span> Daño Punitivo
    </button>

    <div class="nav-label">Documentos</div>
    <button class="nav-item" data-tool="carta-documento">
      <span class="nav-icon">✉️</span> Carta Documento
    </button>
  </nav>

  <div class="sidebar-footer">
    MVC Abogados &copy; 2025<br>
    Prov. de Buenos Aires, Argentina
  </div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">Herramientas Legales</div>
    <div class="topbar-badge">MVC Abogados</div>
  </header>
  <div id="tool-container"></div>
</div>

<script type="module">
  const TOOLS = {
    liquidacion:      { label: 'Liquidación Laboral — LCT',          load: () => import('./tools/liquidacion.js').then(m => m.initLiquidacion) },
    ley24013:         { label: 'Ley 24.013 — Empleo No Registrado',  load: () => import('./tools/ley24013.js').then(m => m.initLey24013) },
    ley25323:         { label: 'Ley 25.323 — Recargos',              load: () => import('./tools/ley25323.js').then(m => m.initLey25323) },
    intereses:        { label: 'Intereses Judiciales — BPBA',        load: () => import('./tools/intereses.js').then(m => m.initIntereses) },
    actualizacion:    { label: 'Actualización Monetaria',            load: () => import('./tools/actualizacion.js').then(m => m.initActualizacion) },
    plazos:           { label: 'Plazos Procesales',                  load: () => import('./tools/plazos.js').then(m => m.initPlazos) },
    incapacidad:      { label: 'Indemnización por Incapacidad',       load: () => import('./tools/incapacidad.js').then(m => m.initIncapacidad) },
    'danio-punitivo': { label: 'Daño Punitivo — Art. 52 bis',        load: () => import('./tools/danio-punitivo.js').then(m => m.initDanioPunitivo) },
    'carta-documento':{ label: 'Generador de Carta Documento',       load: () => import('./tools/carta-documento.js').then(m => m.initCartaDocumento) },
  };

  const ICONS = {
    liquidacion:'⚖️', ley24013:'📋', ley25323:'➕',
    intereses:'📈', actualizacion:'💹', plazos:'📅',
    incapacidad:'🩺', 'danio-punitivo':'⚠️', 'carta-documento':'✉️'
  };

  const CATS = {
    'Derecho Laboral':    ['liquidacion','ley24013','ley25323'],
    'Cálculos Judiciales':['intereses','actualizacion','plazos'],
    'Indemnizaciones':    ['incapacidad','danio-punitivo'],
    'Documentos':         ['carta-documento'],
  };

  let currentTool = null, cleanupFn = null;
  const container   = document.getElementById('tool-container');
  const topbarTitle = document.getElementById('topbar-title');
  const sidebar     = document.getElementById('sidebar');

  function showWelcome() {
    if (typeof cleanupFn === 'function') { cleanupFn(); cleanupFn = null; }
    currentTool = null;

    const sections = Object.entries(CATS).map(([cat, keys]) => {
      const cards = keys.map(key => `
        <div class="welcome-card" data-tool="${key}">
          <div class="wc-icon">${ICONS[key]}</div>
          <div class="wc-name">${TOOLS[key].label}</div>
        </div>`).join('');
      return `
        <div style="margin-bottom:28px;">
          <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-muted);margin-bottom:12px;">${cat}</div>
          <div class="welcome-grid">${cards}</div>
        </div>`;
    }).join('');

    container.innerHTML = `
      <div class="welcome-screen">
        <h1>MVC Abogados</h1>
        <p>Herramientas para la práctica profesional de la abogacía Bonaerense.</p>
        ${sections}
      </div>`;

    container.querySelectorAll('.welcome-card').forEach(c =>
      c.addEventListener('click', () => loadTool(c.dataset.tool)));

    topbarTitle.textContent = 'Herramientas Legales';
    setActive(null);
  }

  async function loadTool(key) {
    if (key === currentTool) return;
    if (typeof cleanupFn === 'function') { cleanupFn(); cleanupFn = null; }
    currentTool = key;
    setActive(key);
    topbarTitle.textContent = TOOLS[key].label;

    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-muted);">Cargando...</div>';

    try {
      const fn = await TOOLS[key].load();
      container.innerHTML = '';
      container.style.animation = 'none';
      void container.offsetHeight;
      container.style.animation = '';
      const r = fn(container);
      if (typeof r === 'function') cleanupFn = r;
    } catch(err) {
      container.innerHTML = `<div class="tool-card"><h2>⚠ Error al cargar</h2>
        <p style="color:var(--color-muted);margin-top:8px;">${err.message}</p></div>`;
    }

    sidebar.classList.remove('open');
  }

  function setActive(key) {
    document.querySelectorAll('.nav-item[data-tool]').forEach(b =>
      b.classList.toggle('active', b.dataset.tool === key));
  }

  document.querySelectorAll('[data-tool]').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.tool;
      t === 'home' ? showWelcome() : loadTool(t);
    }));

  document.getElementById('menu-toggle').addEventListener('click', () =>
    sidebar.classList.toggle('open'));

  document.getElementById('main').addEventListener('click', () => {
    if (window.innerWidth <= 768) sidebar.classList.remove('open');
  });

  showWelcome();
</script>
</body>
</html>
